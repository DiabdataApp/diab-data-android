name: "🧪 CI Tests"
run-name: "Tests — ${{ github.head_ref }} → ${{ github.base_ref }}"

on:
  pull_request:
    branches: ['dev', 'main']

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "RELAY_SERVER_URL=${{ secrets.RELAY_SERVER_URL }}" > local.properties

      - run: chmod +x ./gradlew

      - name: Build debug
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew test