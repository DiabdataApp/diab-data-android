name: "🧪 Beta Pre-Release"
run-name: "Pre-Release — ${{ github.sha }}"

on:
  pull_request:
    branches: ['dev']
    types: [closed]

permissions:
  contents: write

jobs:
  pre-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "RELAY_SERVER_URL=${{ secrets.RELAY_SERVER_URL }}" > local.properties

      - run: chmod +x ./gradlew

      - name: Build Phone APK (Debug)
        run: ./gradlew :app:assembleDebug

      - name: Build Wear APK (Debug)
        run: ./gradlew :wear:assembleDebug

      - name: Generate beta tag
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          
          BETA_COUNT=$(git tag -l "v${VERSION_NAME}-beta.*" | wc -l)
          NEXT_BETA=$((BETA_COUNT + 1))
          
          TAG="v${VERSION_NAME}-beta.${NEXT_BETA}"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Tag: $TAG"

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             DiabData-phone-${{ steps.version.outputs.tag }}.apk
          mv wear/build/outputs/apk/debug/wear-debug.apk \
             DiabData-wear-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Pre-Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target dev \
            --title "🧪 Beta ${{ steps.version.outputs.tag }}" \
            --prerelease \
            --generate-notes \
            --notes "## 🧪 Pre-Release Beta
          
          **Version :** ${{ steps.version.outputs.version_name }}
          **Tag :** \`${{ steps.version.outputs.tag }}\`
          **PR :** #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}
          **Author :** @${{ github.event.pull_request.user.login }}
          
          > ⚠️ Development build (debug, unsigned, not minified).
          > For testing purposes only.
          
          ### 📥 Downloads
          - 📱 **DiabData-phone** — Mobile app
          - ⌚ **DiabData-wear** — Wear OS app" \
            DiabData-phone-${{ steps.version.outputs.tag }}.apk \
            DiabData-wear-${{ steps.version.outputs.tag }}.apk